name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Деплоим только если CI прошёл успешно (или запущен вручную)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
    - name: Deploy to VPS
      env:
        SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        HOST: ${{ secrets.DEPLOY_HOST }}
        APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
        LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        VK_GROUP_TOKEN: ${{ secrets.VK_GROUP_TOKEN }}
        VK_GROUP_ID: ${{ secrets.VK_GROUP_ID }}
        VK_SECRET: ${{ secrets.VK_SECRET }}
        VK_CONFIRMATION_STRING: ${{ secrets.VK_CONFIRMATION_STRING }}
        VK_APP_SECRET: ${{ secrets.VK_APP_SECRET }}
        VK_APP_ID: ${{ secrets.VK_APP_ID }}
        VK_OAUTH_REDIRECT_URI: ${{ secrets.VK_OAUTH_REDIRECT_URI }}
        MASTER_BOOKING_SLUG: ${{ secrets.MASTER_BOOKING_SLUG }}
        TELEGRAM_BOT_USERNAME: ${{ secrets.TELEGRAM_BOT_USERNAME }}
        TELEGRAM_API_BASE: ${{ secrets.TELEGRAM_API_BASE }}
        WEB_BOOKING_ENABLED: ${{ secrets.WEB_BOOKING_ENABLED }}
        WEB_BOOKING_ALLOWED_SLUGS: ${{ secrets.WEB_BOOKING_ALLOWED_SLUGS }}
      run: |
        set -euo pipefail

        if [ -z "$APP_DOMAIN" ] || [ -z "$LETSENCRYPT_EMAIL" ] || [ -z "$JWT_SECRET" ] || [ -z "$TELEGRAM_BOT_TOKEN" ]; then
          echo "One or more required secrets are missing: APP_DOMAIN, LETSENCRYPT_EMAIL, JWT_SECRET, TELEGRAM_BOT_TOKEN"
          exit 1
        fi

        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H $HOST >> ~/.ssh/known_hosts 2>/dev/null

        ssh -i ~/.ssh/deploy_key root@$HOST << ENDSSH
          set -euo pipefail

          cd ~/home-calendar
          git checkout -- . 2>/dev/null || true
          git pull --ff-only origin main

          printf "APP_DOMAIN=%s\nLETSENCRYPT_EMAIL=%s\nJWT_SECRET=%s\nTELEGRAM_BOT_TOKEN=%s\nVK_GROUP_TOKEN=%s\nVK_GROUP_ID=%s\nVK_SECRET=%s\nVK_CONFIRMATION_STRING=%s\nVK_APP_SECRET=%s\nVK_APP_ID=%s\nVK_OAUTH_REDIRECT_URI=%s\nMASTER_BOOKING_SLUG=%s\nTELEGRAM_BOT_USERNAME=%s\nTELEGRAM_API_BASE=%s\nWEB_BOOKING_ENABLED=%s\nWEB_BOOKING_ALLOWED_SLUGS=%s\n" \
            "${APP_DOMAIN}" \
            "${LETSENCRYPT_EMAIL}" \
            "${JWT_SECRET}" \
            "${TELEGRAM_BOT_TOKEN}" \
            "${VK_GROUP_TOKEN}" \
            "${VK_GROUP_ID}" \
            "${VK_SECRET}" \
            "${VK_CONFIRMATION_STRING}" \
            "${VK_APP_SECRET}" \
            "${VK_APP_ID}" \
            "${VK_OAUTH_REDIRECT_URI}" \
            "${MASTER_BOOKING_SLUG}" \
            "${TELEGRAM_BOT_USERNAME}" \
            "${TELEGRAM_API_BASE}" \
            "${WEB_BOOKING_ENABLED}" \
            "${WEB_BOOKING_ALLOWED_SLUGS}" > .env

          # Clean stale layers/images to avoid ENOSPC on long-lived host.
          docker builder prune -af || true
          docker image prune -af || true

          # Build first; if build fails, workflow must fail and old app keeps running.
          docker compose -f docker-compose.prod.yml build app

          # Recreate app stack with freshly built image.
          docker compose -f docker-compose.prod.yml up -d app caddy db
          docker compose -f docker-compose.prod.yml ps
          echo "Deploy complete"
        ENDSSH
