<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#2f9f68">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <!-- Telegram Mini App -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- VK Mini App Bridge -->
  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <title>Запись</title>
  <link rel="stylesheet" href="/booking.css">
</head>
<body>
  <div id="app">
    <!-- Шаг 1: Выбор услуги -->
    <section class="step" id="stepServices">
      <div class="step-header">
        <div class="step-header-row">
          <div class="studio-brand-wrap">
            <div id="studioBrand" class="studio-brand">RoVa</div>
            <div id="studioSubtitle" class="studio-subtitle">Epil &amp; Care</div>
            <div id="masterName" class="master-name"></div>
          </div>
          <button class="btn-my-bookings" onclick="BookingApp.showMyBookings()">Мои записи</button>
        </div>
        <p class="step-subtitle">Выберите услугу</p>
      </div>
      <div id="firstVisitBanner" class="empty-state" style="display:none; margin-bottom:12px;">
        <p id="firstVisitBannerText" style="margin:0;"></p>
      </div>
      <div class="service-tabs" id="serviceMethodTabs" style="display:none;">
        <button class="service-tab active" data-method="all" onclick="BookingApp.setMethodFilter('all')">Все</button>
        <button class="service-tab" data-method="sugar" onclick="BookingApp.setMethodFilter('sugar')">Сахар</button>
        <button class="service-tab" data-method="wax" onclick="BookingApp.setMethodFilter('wax')">Воск</button>
      </div>
      <div class="service-tabs service-subtabs" id="serviceCategoryTabs" style="display:none;">
        <button class="service-tab active" data-category="all" onclick="BookingApp.setCategoryFilter('all')">Все</button>
        <button class="service-tab" data-category="Услуги" onclick="BookingApp.setCategoryFilter('Услуги')">Зоны</button>
        <button class="service-tab" data-category="Комплексы" onclick="BookingApp.setCategoryFilter('Комплексы')">Комплексы</button>
      </div>
      <div id="servicesList" class="services-list">
        <!-- skeleton or services -->
      </div>
      <div id="servicesEmpty" class="empty-state" style="display:none;">
        <div class="empty-icon">📋</div>
        <p>У мастера пока нет доступных услуг</p>
      </div>

      <!-- Selection summary bar — появляется когда выбрана хотя бы 1 услуга -->
      <div id="selectionBar" class="selection-bar" style="display:none;">
        <div class="selection-bar-info">
          <span id="selectionBarCount" class="selection-bar-count"></span>
          <span id="selectionBarMeta" class="selection-bar-meta"></span>
        </div>
        <button class="selection-bar-btn" onclick="BookingApp.proceedToSlots()">Далее &rarr;</button>
      </div>
    </section>

    <!-- Шаг 2: Выбор даты и слота -->
    <section class="step" id="stepSlots" style="display:none;">
      <div class="step-header">
        <button class="btn-back" onclick="BookingApp.goBack('stepServices')">&larr; Назад</button>
        <h2 id="selectedServiceName"></h2>
        <div id="selectedServicesChips" class="selected-chips" style="display:none;"></div>
        <p class="step-subtitle">Выберите дату и время</p>
      </div>
      <div class="date-strip" id="dateStrip">
        <!-- horizontal scrollable dates -->
      </div>
      <div id="slotsList" class="slots-grid">
        <!-- skeleton or slots -->
      </div>
      <div id="slotsEmpty" class="empty-state" style="display:none;">
        <div class="empty-icon">🕐</div>
        <p>Нет свободных слотов на эту дату</p>
        <button class="btn-secondary" onclick="BookingApp.nextDate()">Попробовать другой день</button>
      </div>
    </section>

    <!-- Шаг 3: Подтверждение -->
    <section class="step" id="stepConfirm" style="display:none;">
      <div class="step-header">
        <button class="btn-back" onclick="BookingApp.goBack('stepSlots')">&larr; Назад</button>
        <h2>Подтверждение записи</h2>
      </div>
      <div class="confirm-card">
        <!-- Список услуг (для мультивыбора — несколько строк) -->
        <div id="confirmServicesBlock">
          <div class="confirm-row">
            <span class="confirm-label">Услуга</span>
            <span id="confirmService" class="confirm-value"></span>
          </div>
        </div>
        <div class="confirm-row">
          <span class="confirm-label">Дата</span>
          <span id="confirmDate" class="confirm-value"></span>
        </div>
        <div class="confirm-row">
          <span class="confirm-label">Время</span>
          <span id="confirmTime" class="confirm-value"></span>
        </div>
        <div class="confirm-row">
          <span class="confirm-label">Длительность</span>
          <span id="confirmDuration" class="confirm-value"></span>
        </div>
        <div class="confirm-row" id="confirmPriceRow" style="display:none;">
          <span class="confirm-label">Стоимость</span>
          <span id="confirmPrice" class="confirm-value confirm-price"></span>
        </div>
        <div class="confirm-row" id="confirmDiscountRow" style="display:none;">
          <span class="confirm-label">Скидка</span>
          <span id="confirmDiscount" class="confirm-value"></span>
        </div>
        <div class="confirm-row" id="confirmFinalPriceRow" style="display:none;">
          <span class="confirm-label">Итого</span>
          <span id="confirmFinalPrice" class="confirm-value confirm-price"></span>
        </div>
        <textarea id="confirmNote" class="confirm-note" placeholder="Комментарий к записи (необязательно)" rows="2"></textarea>
      </div>
      <button class="btn-primary btn-book" id="btnBook" onclick="BookingApp.confirmBooking()">
        Записаться
      </button>
    </section>

    <!-- Шаг 4: Готово -->
    <section class="step" id="stepDone" style="display:none;">
      <div class="done-card">
        <div class="done-icon">✅</div>
        <h2>Вы записаны!</h2>
        <p id="doneDetails" class="done-details"></p>
        <div class="done-export-actions">
          <a id="doneGoogleLink" class="btn-secondary done-export-btn" href="#" target="_blank" rel="noopener noreferrer">
            Экспорт в Google Calendar
          </a>
          <button id="doneAppleBtn" class="btn-secondary done-export-btn" type="button">
            Экспорт в Apple Calendar (.ics)
          </button>
        </div>
        <button class="btn-secondary" onclick="BookingApp.showMyBookings()">Мои записи</button>
        <button class="btn-primary" onclick="BookingApp.reset()">Записаться ещё</button>
      </div>
    </section>

    <!-- Мои записи -->
    <section class="step" id="stepMyBookings" style="display:none;">
      <div class="step-header">
        <button class="btn-back" onclick="BookingApp.goBack('stepServices')">&larr; Назад к услугам</button>
        <h2>Мои записи</h2>
      </div>
      <div id="myBookingsList" class="bookings-list"></div>
      <div id="myBookingsEmpty" class="empty-state" style="display:none;">
        <div class="empty-icon">📅</div>
        <p>У вас пока нет записей</p>
        <button class="btn-primary" style="margin-top:12px;" onclick="BookingApp.reset()">Записаться</button>
      </div>
    </section>

    <!-- Ошибка сети (toast) -->
    <div id="networkToast" class="network-toast" style="display:none;">
      <span id="networkToastText"></span>
      <button class="toast-close" onclick="BookingApp.hideToast()">&times;</button>
    </div>

    <!-- Полноэкранный лоадер -->
    <div id="fullLoader" class="full-loader" style="display:none;">
      <div class="loader-spinner"></div>
    </div>
  </div>

  <script src="/booking-export-utils.js"></script>
  <script src="/booking.js"></script>
</body>
</html>
